<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>אלישלט · Elishelet</title>
<meta name="description" content="כתבו טקסט על הדף — מתעקם בפרספקטיבה בזמן אמת. הורידו כתמונה.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Assistant:wght@400;600;700&family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@400;700&family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel-2:#20242e; --line:#2c313d;
    --text:#eef1f6; --muted:#9aa3b2; --accent:#7c5cff; --accent-2:#4D2B75;
    --radius:14px;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f5f8; --panel:#ffffff; --panel-2:#f0f1f5; --line:#e2e5ec;
           --text:#191c22; --muted:#5c6373; }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Assistant",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.4;
    -webkit-font-smoothing:antialiased;
  }
  .app{ display:grid; grid-template-columns:minmax(320px,420px) 1fr; gap:20px;
        max-width:1200px; margin:0 auto; padding:20px; min-height:100%; }
  @media (max-width:860px){ .app{ grid-template-columns:1fr; } }

  header h1{ margin:0 0 2px; font-size:22px; font-weight:800; letter-spacing:.5px; }
  header p{ margin:0 0 14px; color:var(--muted); font-size:13px; }

  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
           padding:16px; }
  .stage{ display:flex; align-items:center; justify-content:center; padding:10px;
          position:sticky; top:20px; }

  .canvas-wrap{ position:relative; width:100%; max-width:520px; margin:auto; }
  canvas#view{ display:block; width:100%; height:auto; border-radius:10px;
               box-shadow:0 10px 40px rgba(0,0,0,.35); background:var(--panel-2); }
  svg#cal{ position:absolute; inset:0; width:100%; height:100%; touch-action:none;
           display:none; }
  svg#cal.on{ display:block; }
  svg#cal circle{ fill:rgba(124,92,255,.9); stroke:#fff; stroke-width:3;
                  cursor:grab; }
  svg#cal polygon{ fill:rgba(124,92,255,.10); stroke:rgba(124,92,255,.9);
                   stroke-width:2; stroke-dasharray:8 6; }

  .field{ margin-bottom:14px; }
  .field > label{ display:block; font-size:12px; font-weight:700; color:var(--muted);
                  text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
  textarea{ width:100%; min-height:96px; resize:vertical; padding:10px 12px;
            border-radius:10px; border:1px solid var(--line); background:var(--panel-2);
            color:var(--text); font-family:inherit; font-size:16px; }
  select, input[type=range]{ width:100%; }
  select{ padding:9px 10px; border-radius:10px; border:1px solid var(--line);
          background:var(--panel-2); color:var(--text); font-family:inherit; font-size:14px; }

  .seg{ display:inline-flex; background:var(--panel-2); border:1px solid var(--line);
        border-radius:10px; overflow:hidden; }
  .seg button{ appearance:none; border:0; background:transparent; color:var(--muted);
               padding:8px 14px; font:inherit; font-weight:700; cursor:pointer; }
  .seg button.active{ background:var(--accent); color:#fff; }

  .swatches{ display:flex; gap:10px; flex-wrap:wrap; }
  .swatch{ width:34px; height:34px; border-radius:50%; cursor:pointer;
           border:3px solid transparent; box-shadow:0 0 0 1px var(--line); }
  .swatch.active{ border-color:var(--text); }

  .row{ display:flex; gap:12px; }
  .row > .field{ flex:1; }
  .val{ float:inline-end; color:var(--muted); font-weight:400; }

  .actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:6px; }
  button.primary{ flex:1; appearance:none; border:0; border-radius:10px; cursor:pointer;
    background:var(--accent); color:#fff; font:inherit; font-weight:800; padding:12px;
    font-size:15px; }
  button.ghost{ appearance:none; border:1px solid var(--line); border-radius:10px;
    background:var(--panel-2); color:var(--text); font:inherit; font-weight:700;
    padding:12px 14px; cursor:pointer; }
  .check{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted);
          margin-top:12px; }
  .cal-out{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px;
            color:var(--muted); margin-top:8px; word-break:break-all; display:none; }
  .cal-out.on{ display:block; }

  .toast{ position:fixed; inset-block-end:24px; inset-inline-start:50%;
           transform:translateX(-50%) translateY(20px); background:#111827; color:#fff;
           padding:10px 18px; border-radius:999px; font-size:14px; font-weight:700;
           box-shadow:0 8px 30px rgba(0,0,0,.35); opacity:0; pointer-events:none;
           transition:opacity .2s, transform .2s; z-index:50; }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div>
    <header>
      <h1>אלישלט</h1>
      <p>הקלידו טקסט — הוא ייצמד לדף בפרספקטיבה. הכול קורה במכשיר שלכם.</p>
    </header>

    <div class="panel">
      <div class="field">
        <label for="text">טקסט</label>
        <textarea id="text" placeholder="כתבו כאן…">שלום עולם</textarea>
      </div>

      <div class="row">
        <div class="field">
          <label>כיוון</label>
          <div class="seg" id="dir">
            <button data-v="rtl" class="active">RTL</button>
            <button data-v="ltr">LTR</button>
          </div>
        </div>
        <div class="field">
          <label>יישור</label>
          <div class="seg" id="align">
            <button data-v="start">התחלה</button>
            <button data-v="center" class="active">מרכז</button>
            <button data-v="end">סוף</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>גופן</label>
        <select id="font">
          <option value="Assistant">Assistant</option>
          <option value="Rubik">Rubik</option>
          <option value="Heebo">Heebo</option>
          <option value="Frank Ruhl Libre">Frank Ruhl Libre</option>
          <option value="Alef">Alef</option>
        </select>
      </div>

      <div class="field">
        <label>צבע דיו</label>
        <div class="swatches" id="colors"></div>
      </div>

      <div class="row">
        <div class="field">
          <label>גודל <span class="val" id="sizeVal">אוטומטי</span></label>
          <input type="range" id="size" min="0" max="100" value="0">
        </div>
        <div class="field">
          <label>גובה שורה <span class="val" id="lhVal">1.2</span></label>
          <input type="range" id="lh" min="90" max="200" value="120">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>יישור אנכי</label>
          <div class="seg" id="valign">
            <button data-v="top">עליון</button>
            <button data-v="middle" class="active">מרכז</button>
            <button data-v="bottom">תחתון</button>
          </div>
        </div>
        <div class="field">
          <label>מיזוג</label>
          <div class="seg" id="blend">
            <button data-v="multiply" class="active">כפל</button>
            <button data-v="source-over">רגיל</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>עוצמת דיו <span class="val" id="opVal">100%</span></label>
        <input type="range" id="opacity" min="20" max="100" value="100">
      </div>

      <div class="actions">
        <button class="primary" id="download">הורדה כ־PNG</button>
        <button class="ghost" id="sticker">מדבקה 🏷️</button>
        <button class="ghost" id="copy">העתקת קישור</button>
        <button class="ghost" id="share" hidden>שיתוף</button>
      </div>

      <label class="check"><input type="checkbox" id="calToggle"> כיול פינות הדף</label>
      <div class="cal-out" id="calOut"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div class="panel stage">
    <div class="canvas-wrap">
      <canvas id="view" width="1568" height="2740"></canvas>
      <svg id="cal" viewBox="0 0 1568 2740" preserveAspectRatio="none">
        <polygon id="calPoly" points=""></polygon>
        <g id="calHandles"></g>
      </svg>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================================
   Elishelet — client-side perspective sign generator.
   Single source of truth: one full-res canvas used for both preview & download.
   ========================================================================== */

const CONFIG = {
  imageSrc: "empty.jpg",
  imageW: 1568, imageH: 2740,
  // Paper corners measured against the real image (verified by overlay).
  corners: { TL:[251,1980], TR:[1070,1997], BR:[1049,2539], BL:[293,2491] },
  safeScale: 0.90,      // 5% inset per side (spec §2.2)
  supersample: 2,       // offscreen text render scale for crisp glyphs
  mesh: 10,             // grid subdivision per axis for the warp
  palette: [
    { name:"סגול עמוק", hex:"#4D2B75" },
    { name:"פחם",       hex:"#1C1C1C" },
    { name:"כחול רואי", hex:"#1D3557" },
    { name:"אדום כהה",  hex:"#8B0000" },
  ],
  // WhatsApp sticker: 512x512, WebP, <=100KB. Composited from the live meme
  // (view canvas). `crop` (in imageW/imageH space) trims dead wall around the
  // subject so it fills the square better.
  sticker: { size:512, margin:16, radius:60, border:6,
             crop:[95,120,1475,2735], maxBytes:100*1024,
    // WIP — true die-cut sticker from a transparent PNG cutout of the person.
    // When `enabled`, the sticker composites text onto the cutout's note and
    // exports on a transparent background (no white card).
    // TODO: replace `src` with the higher-res, EMPTY-note transparent PNG,
    //       then re-measure w/h/corners and set enabled:true.
    cutout: {
      enabled:false,
      src:"PXL_20230904_093112135.PORTRAIT-removebg-preview.png",
      w:375, h:666,
      corners:{ TL:[55,484], TR:[248,456], BR:[251,585], BL:[60,602] },
    },
  },
};

const state = {
  text:"שלום עולם", dir:"rtl", align:"center", valign:"middle",
  font:"Assistant", color:CONFIG.palette[0].hex,
  sizePct:0 /* 0 = auto */, lineHeight:1.2, blend:"multiply", opacity:1,
  corners: structuredClone(CONFIG.corners),
};

const view = document.getElementById("view");
const ctx = view.getContext("2d");
const off = document.createElement("canvas");
const octx = off.getContext("2d");
let bg = null;

/* ---------- Homography (4-point DLT), no dependencies ---------------------- */
// Solve 8x8 linear system by Gaussian elimination with partial pivoting.
function solve(A, b){
  const n = b.length;
  const M = A.map((r,i)=>[...r, b[i]]);
  for(let c=0;c<n;c++){
    let p=c; for(let r=c+1;r<n;r++) if(Math.abs(M[r][c])>Math.abs(M[p][c])) p=r;
    [M[c],M[p]]=[M[p],M[c]];
    const pv=M[c][c];
    for(let k=c;k<=n;k++) M[c][k]/=pv;
    for(let r=0;r<n;r++){ if(r===c) continue; const f=M[r][c];
      for(let k=c;k<=n;k++) M[r][k]-=f*M[c][k]; }
  }
  return M.map(r=>r[n]);
}
// Homography mapping src quad -> dst quad. src/dst: [[x,y]*4] (TL,TR,BR,BL).
function homography(src, dst){
  const A=[], b=[];
  for(let i=0;i<4;i++){
    const [x,y]=src[i], [X,Y]=dst[i];
    A.push([x,y,1,0,0,0,-x*X,-y*X]); b.push(X);
    A.push([0,0,0,x,y,1,-x*Y,-y*Y]); b.push(Y);
  }
  const h=solve(A,b); h.push(1);
  return h; // [h00..h22]
}
function applyH(h, x, y){
  const w = h[6]*x + h[7]*y + h[8];
  return [ (h[0]*x+h[1]*y+h[2])/w, (h[3]*x+h[4]*y+h[5])/w ];
}

/* ---------- Geometry helpers ---------------------------------------------- */
function cornerList(c){ return [c.TL,c.TR,c.BR,c.BL]; }
function centroid(pts){
  const x=pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const y=pts.reduce((s,p)=>s+p[1],0)/pts.length; return [x,y];
}
// Inset the quad toward its centroid (safe rendering zone).
function safeQuad(c){
  const pts=cornerList(c), ctr=centroid(pts), s=CONFIG.safeScale;
  return pts.map(([x,y])=>[ctr[0]+s*(x-ctr[0]), ctr[1]+s*(y-ctr[1])]);
}
function dist(a,b){ return Math.hypot(a[0]-b[0], a[1]-b[1]); }
function avgPaperSize(c){
  const [TL,TR,BR,BL]=cornerList(c);
  const w=(dist(TL,TR)+dist(BL,BR))/2, h=(dist(TL,BL)+dist(TR,BR))/2;
  return { w, h };
}

/* ---------- Text layout into the offscreen rectangle ----------------------- */
function fontStr(px){ return `${px}px "${state.font}"`; }

// Wrap into lines that fit maxW at a given font size. Returns {lines, width}.
function wrap(text, px, maxW){
  octx.font = fontStr(px);
  const lines=[];
  let maxLineW=0;
  for(const para of text.split("\n")){
    if(para===""){ lines.push(""); continue; }
    const words=para.split(/(\s+)/); // keep spaces
    let line="";
    for(const tok of words){
      const cand=line+tok;
      if(octx.measureText(cand).width>maxW && line.trim()!==""){
        lines.push(line.trimEnd());
        maxLineW=Math.max(maxLineW, octx.measureText(line.trimEnd()).width);
        line=tok.replace(/^\s+/,"");
      } else { line=cand; }
    }
    lines.push(line.trimEnd());
    maxLineW=Math.max(maxLineW, octx.measureText(line.trimEnd()).width);
  }
  return { lines, width:maxLineW };
}

// Largest size (px) that fits both width and height, or the manual size.
function fitSize(text, maxW, maxH){
  if(state.sizePct>0){
    // Manual: map 1..100 -> px range relative to box height.
    return Math.max(8, Math.round((state.sizePct/100)*maxH*0.9));
  }
  let lo=8, hi=Math.round(maxH), best=lo;
  for(let i=0;i<22;i++){
    const mid=(lo+hi)/2;
    const {lines,width}=wrap(text, mid, maxW);
    const totalH=lines.length*mid*state.lineHeight;
    if(width<=maxW && totalH<=maxH){ best=mid; lo=mid; } else { hi=mid; }
  }
  return Math.floor(best);
}

function renderText(){
  const paper=avgPaperSize(state.corners);
  const SS=CONFIG.supersample;
  const OW=Math.max(2,Math.round(paper.w*SS));
  const OH=Math.max(2,Math.round(paper.h*SS));
  off.width=OW; off.height=OH;
  octx.clearRect(0,0,OW,OH);

  const text=state.text.length?state.text:" ";
  const px=fitSize(text, OW, OH);
  const {lines}=wrap(text, px, OW);

  octx.font=fontStr(px);
  octx.fillStyle=state.color;
  octx.direction=state.dir;
  octx.textBaseline="top";

  const lineH=px*state.lineHeight;
  const totalH=lines.length*lineH;
  let y = state.valign==="top" ? 0
        : state.valign==="bottom" ? (OH-totalH)
        : (OH-totalH)/2;

  // Map logical alignment (start/end) to physical using direction.
  const rtl = state.dir==="rtl";
  let physical = state.align;
  if(state.align==="start") physical = rtl?"right":"left";
  else if(state.align==="end") physical = rtl?"left":"right";
  else physical = "center";
  octx.textAlign = physical;
  const x = physical==="left" ? 0 : physical==="right" ? OW : OW/2;

  for(const line of lines){ octx.fillText(line, x, y); y+=lineH; }
  return { OW, OH };
}

/* ---------- Warp offscreen -> paper quad via triangle mesh ----------------- */
function affineTri(s, d){
  // Solve affine [a c e; b d f] mapping src triangle s -> dst triangle d.
  const [ [x0,y0],[x1,y1],[x2,y2] ] = s;
  const [ [u0,v0],[u1,v1],[u2,v2] ] = d;
  const D = x0*(y1-y2)+x1*(y2-y0)+x2*(y0-y1);
  const a=(u0*(y1-y2)+u1*(y2-y0)+u2*(y0-y1))/D;
  const c=(u0*(x2-x1)+u1*(x0-x2)+u2*(x1-x0))/D;
  const b=(v0*(y1-y2)+v1*(y2-y0)+v2*(y0-y1))/D;
  const dd=(v0*(x2-x1)+v1*(x0-x2)+v2*(x1-x0))/D;
  const e=u0-a*x0-c*y0, f=v0-b*x0-dd*y0;
  return [a,b,c,dd,e,f];
}
// Slightly inflate a triangle around its centroid to hide sub-pixel seams.
function inflate(tri, px){
  const cx=(tri[0][0]+tri[1][0]+tri[2][0])/3;
  const cy=(tri[0][1]+tri[1][1]+tri[2][1])/3;
  return tri.map(([x,y])=>{
    const dx=x-cx, dy=y-cy, len=Math.hypot(dx,dy)||1;
    return [x+dx/len*px, y+dy/len*px];
  });
}
// Warp the offscreen text (`off`, OW x OH) onto `corners` in target ctx `tc`.
function warp(tc, corners, OW, OH){
  const h=homography(
    [[0,0],[OW,0],[OW,OH],[0,OH]],
    safeQuad(corners)
  );
  const N=CONFIG.mesh;
  // Precompute grid of source & mapped-dest points.
  const S=[], Dp=[];
  for(let j=0;j<=N;j++){
    S[j]=[]; Dp[j]=[];
    for(let i=0;i<=N;i++){
      const sx=i/N*OW, sy=j/N*OH;
      S[j][i]=[sx,sy]; Dp[j][i]=applyH(h,sx,sy);
    }
  }
  tc.globalCompositeOperation=state.blend;
  tc.globalAlpha=state.opacity;
  for(let j=0;j<N;j++) for(let i=0;i<N;i++){
    const s00=S[j][i],s10=S[j][i+1],s11=S[j+1][i+1],s01=S[j+1][i];
    const d00=Dp[j][i],d10=Dp[j][i+1],d11=Dp[j+1][i+1],d01=Dp[j+1][i];
    drawTri(tc,[s00,s10,s11],[d00,d10,d11]);
    drawTri(tc,[s00,s11,s01],[d00,d11,d01]);
  }
  tc.globalAlpha=1;
  tc.globalCompositeOperation="source-over";
}
function drawTri(tc, s, d){
  const [m00,m01,m10,m11,e,f]=affineTri(s,d);
  const clip=inflate(d,0.6);
  tc.save();
  tc.beginPath();
  tc.moveTo(clip[0][0],clip[0][1]);
  tc.lineTo(clip[1][0],clip[1][1]);
  tc.lineTo(clip[2][0],clip[2][1]);
  tc.closePath();
  tc.clip();
  tc.setTransform(m00,m01,m10,m11,e,f);
  tc.drawImage(off,0,0);
  tc.setTransform(1,0,0,1,0,0);
  tc.restore();
}

/* ---------- Master render (rAF-throttled) ---------------------------------- */
let queued=false;
function requestRender(){
  if(queued) return; queued=true;
  requestAnimationFrame(()=>{ queued=false; render(); });
}
function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
  ctx.clearRect(0,0,view.width,view.height);
  if(bg) ctx.drawImage(bg,0,0,view.width,view.height);
  const {OW,OH}=renderText();
  warp(ctx, state.corners, OW, OH);
  updateCal();
  syncUrl();
}

/* ---------- UI wiring ------------------------------------------------------ */
function segGroup(id, key, cb){
  const el=document.getElementById(id);
  el.addEventListener("click", e=>{
    const btn=e.target.closest("button"); if(!btn) return;
    [...el.children].forEach(b=>b.classList.toggle("active", b===btn));
    state[key]=btn.dataset.v; (cb||requestRender)();
  });
}
segGroup("dir","dir");
segGroup("align","align");
segGroup("valign","valign");
segGroup("blend","blend");

document.getElementById("text").addEventListener("input", e=>{
  state.text=e.target.value; requestRender();
});
document.getElementById("font").addEventListener("change", async e=>{
  state.font=e.target.value;
  try{ await document.fonts.load(`700 40px "${state.font}"`); }catch(_){}
  requestRender();
});
const sizeEl=document.getElementById("size"), sizeVal=document.getElementById("sizeVal");
sizeEl.addEventListener("input", e=>{
  state.sizePct=+e.target.value;
  sizeVal.textContent = state.sizePct===0 ? "אוטומטי" : state.sizePct+"%";
  requestRender();
});
const lhEl=document.getElementById("lh"), lhVal=document.getElementById("lhVal");
lhEl.addEventListener("input", e=>{
  state.lineHeight=+e.target.value/100; lhVal.textContent=state.lineHeight.toFixed(2);
  requestRender();
});
const opEl=document.getElementById("opacity"), opVal=document.getElementById("opVal");
opEl.addEventListener("input", e=>{
  state.opacity=+e.target.value/100; opVal.textContent=e.target.value+"%";
  requestRender();
});

// Color swatches
const colorsEl=document.getElementById("colors");
CONFIG.palette.forEach((c,i)=>{
  const s=document.createElement("div");
  s.className="swatch"+(i===0?" active":""); s.style.background=c.hex;
  s.dataset.hex=c.hex;
  s.title=c.name; s.setAttribute("role","button"); s.setAttribute("aria-label",c.name);
  s.addEventListener("click",()=>{
    state.color=c.hex;
    [...colorsEl.children].forEach(el=>el.classList.toggle("active", el===s));
    requestRender();
  });
  colorsEl.appendChild(s);
});

/* ---------- Download / share ---------------------------------------------- */
document.getElementById("download").addEventListener("click", ()=>{
  view.toBlob(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download="elishelet.png";
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  }, "image/png");
});
const shareBtn=document.getElementById("share");
if(navigator.canShare){
  shareBtn.hidden=false;
  shareBtn.addEventListener("click", ()=>{
    view.toBlob(async blob=>{
      const file=new File([blob],"elishelet.png",{type:"image/png"});
      if(navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], title:"אלישלט"}); }catch(_){}
      }

  });
}

/* ---------- Download as WhatsApp sticker ---------------------------------- */
function roundRectPath(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2); c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
// Compose the current meme (view canvas) into a 512x512 rounded sticker on a
// transparent background. Returns the canvas.
function buildStickerCanvas(){
  const Z=CONFIG.sticker, N=Z.size;
  const s=document.createElement("canvas"); s.width=N; s.height=N;
  const g=s.getContext("2d");
  g.imageSmoothingEnabled=true; g.imageSmoothingQuality="high";
  const [x0,y0,x1,y1]=Z.crop, cw=x1-x0, ch=y1-y0;
  const avail=N-2*Z.margin, scale=Math.min(avail/cw, avail/ch);
  const dw=cw*scale, dh=ch*scale, dx=(N-dw)/2, dy=(N-dh)/2;
  g.save();
  roundRectPath(g,dx,dy,dw,dh,Z.radius); g.clip();
  g.fillStyle="#fff"; g.fillRect(dx,dy,dw,dh);          // opaque backing
  g.drawImage(view, x0,y0,cw,ch, dx,dy,dw,dh);          // reuse the live meme
  g.restore();
  roundRectPath(g,dx+Z.border/2,dy+Z.border/2,dw-Z.border,dh-Z.border,Z.radius-Z.border/2);
  g.lineWidth=Z.border; g.strokeStyle="rgba(255,255,255,.95)"; g.stroke();
  return s;
}
function canvasBlob(c,type,q){ return new Promise(r=>c.toBlob(r,type,q)); }
async function encodeSticker(c){
  // Prefer WebP (WhatsApp requirement); Safari may fall back to PNG.
  for(const q of [0.92,0.85,0.78,0.7,0.6]){
    const b=await canvasBlob(c,"image/webp",q);
    if(!b || b.type!=="image/webp"){
      const p=await canvasBlob(c,"image/png"); return {blob:p,ext:"png"};
    }
    if(b.size<=CONFIG.sticker.maxBytes || q===0.6) return {blob:b,ext:"webp"};
  }
}
function downloadBlob(blob,name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
// WIP: true die-cut sticker from a transparent cutout of the person.
let cutoutImg=null;
function ensureCutoutImg(){
  if(cutoutImg) return Promise.resolve(cutoutImg);
  return new Promise((res,rej)=>{ const i=new Image();
    i.onload=()=>{cutoutImg=i;res(i);}; i.onerror=rej; i.src=CONFIG.sticker.cutout.src; });
}
async function buildCutoutStickerCanvas(){
  const Z=CONFIG.sticker, CO=Z.cutout, N=Z.size;
  const img=await ensureCutoutImg();
  // Composite person + text warped onto its note, at native cutout resolution.
  const base=document.createElement("canvas"); base.width=CO.w; base.height=CO.h;
  const b=base.getContext("2d"); b.imageSmoothingQuality="high";
  b.drawImage(img,0,0,CO.w,CO.h);
  warp(b, CO.corners, off.width, off.height);   // reuse current text (`off`)
  // Fit onto a transparent 512 square — die-cut, no card/border.
  const s=document.createElement("canvas"); s.width=N; s.height=N;
  const g=s.getContext("2d"); g.imageSmoothingEnabled=true; g.imageSmoothingQuality="high";
  const avail=N-2*Z.margin, scale=Math.min(avail/CO.w, avail/CO.h);
  const dw=CO.w*scale, dh=CO.h*scale;
  g.drawImage(base,0,0,CO.w,CO.h,(N-dw)/2,(N-dh)/2,dw,dh);
  return s;
}
async function getStickerCanvas(){
  return CONFIG.sticker.cutout.enabled ? await buildCutoutStickerCanvas() : buildStickerCanvas();
}
document.getElementById("sticker").addEventListener("click", async ()=>{
  const {blob,ext}=await encodeSticker(await getStickerCanvas());
  downloadBlob(blob,"elishelet-sticker."+ext);
  toast(ext==="webp" ? "מדבקה הורדה ✓" : "הורדה כ־PNG (הדפדפן ללא WebP)");
});
window.buildStickerCanvas=buildStickerCanvas;             // exposed for testing
window.buildCutoutStickerCanvas=buildCutoutStickerCanvas; // exposed for testing

/* ---------- Corner calibration overlay ------------------------------------ */
const cal=document.getElementById("cal");
const calHandles=document.getElementById("calHandles");
const calPoly=document.getElementById("calPoly");
const calOut=document.getElementById("calOut");
const ORDER=["TL","TR","BR","BL"];
ORDER.forEach(k=>{
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("r","22"); c.dataset.k=k; calHandles.appendChild(c);
});
document.getElementById("calToggle").addEventListener("change", e=>{
  cal.classList.toggle("on", e.target.checked);
  calOut.classList.toggle("on", e.target.checked);
  updateCal();
});
function updateCal(){
  const pts=cornerList(state.corners);
  calPoly.setAttribute("points", pts.map(p=>p.join(",")).join(" "));
  [...calHandles.children].forEach(c=>{
    const [x,y]=state.corners[c.dataset.k];
    c.setAttribute("cx",x); c.setAttribute("cy",y);
  });
  if(calOut.classList.contains("on")){
    calOut.textContent = JSON.stringify(state.corners);
  }
}
let drag=null;
function svgPoint(evt){
  const r=cal.getBoundingClientRect();
  const x=(evt.clientX-r.left)/r.width*CONFIG.imageW;
  const y=(evt.clientY-r.top)/r.height*CONFIG.imageH;
  return [Math.round(x),Math.round(y)];
}
cal.addEventListener("pointerdown", e=>{
  const c=e.target.closest("circle"); if(!c) return;
  drag=c.dataset.k; cal.setPointerCapture(e.pointerId); e.preventDefault();
});
cal.addEventListener("pointermove", e=>{
  if(!drag) return;
  state.corners[drag]=svgPoint(e); requestRender();
});
cal.addEventListener("pointerup", ()=>{ drag=null; });

/* ---------- Shareable state in the URL hash -------------------------------- */
// State <-> URL so a shared link reproduces the exact editing status.
const FONTS=["Assistant","Rubik","Heebo","Frank Ruhl Libre","Alef"];
const clamp=(v,a,b)=>{ v=+v; return isFinite(v)?Math.min(b,Math.max(a,v)):a; };
const oneOf=(v,set,def)=>set.includes(v)?v:def;

function stateToHash(){
  const p=new URLSearchParams();
  p.set("t", state.text);
  p.set("d", state.dir);
  p.set("a", state.align);
  p.set("va", state.valign);
  p.set("f", state.font);
  p.set("c", state.color.replace("#",""));
  p.set("s", String(state.sizePct));
  p.set("lh", String(state.lineHeight));
  p.set("b", state.blend==="multiply"?"m":"n");
  p.set("o", String(Math.round(state.opacity*100)));
  // Only include calibration if it was changed from the defaults.
  if(JSON.stringify(state.corners)!==JSON.stringify(CONFIG.corners)){
    const c=state.corners;
    p.set("k",[...c.TL,...c.TR,...c.BR,...c.BL].join(","));
  }
  return p.toString();
}
function applyHash(hash){
  const p=new URLSearchParams(hash);
  if(p.has("t"))  state.text=p.get("t");
  if(p.has("d"))  state.dir=oneOf(p.get("d"),["rtl","ltr"],"rtl");
  if(p.has("a"))  state.align=oneOf(p.get("a"),["start","center","end"],"center");
  if(p.has("va")) state.valign=oneOf(p.get("va"),["top","middle","bottom"],"middle");
  if(p.has("f"))  state.font=oneOf(p.get("f"),FONTS,state.font);
  if(p.has("c")){ const c=(p.get("c")||"").replace(/[^0-9a-fA-F]/g,""); if(c.length===6) state.color="#"+c; }
  if(p.has("s"))  state.sizePct=Math.round(clamp(p.get("s"),0,100));
  if(p.has("lh")) state.lineHeight=clamp(p.get("lh"),0.9,2);
  if(p.has("b"))  state.blend=p.get("b")==="n"?"source-over":"multiply";
  if(p.has("o"))  state.opacity=clamp((+p.get("o"))/100,0.2,1);
  if(p.has("k")){
    const n=(p.get("k")||"").split(",").map(Number);
    if(n.length===8 && n.every(v=>isFinite(v)))
      state.corners={TL:[n[0],n[1]],TR:[n[2],n[3]],BR:[n[4],n[5]],BL:[n[6],n[7]]};
  }
}
let lastHash="";
function syncUrl(){
  const h=stateToHash();
  if(h===lastHash) return;
  lastHash=h;
  history.replaceState(null,"","#"+h);
}
function setSeg(id,v){
  const el=document.getElementById(id);
  [...el.children].forEach(b=>b.classList.toggle("active", b.dataset.v===v));
}
function applyStateToUI(){
  document.getElementById("text").value=state.text;
  setSeg("dir",state.dir); setSeg("align",state.align);
  setSeg("valign",state.valign); setSeg("blend",state.blend);
  document.getElementById("font").value=state.font;
  [...colorsEl.children].forEach(el=>el.classList.toggle("active", el.dataset.hex===state.color));
  sizeEl.value=state.sizePct; sizeVal.textContent=state.sizePct===0?"אוטומטי":state.sizePct+"%";
  lhEl.value=Math.round(state.lineHeight*100); lhVal.textContent=state.lineHeight.toFixed(2);
  opEl.value=Math.round(state.opacity*100); opVal.textContent=Math.round(state.opacity*100)+"%";
}

/* ---------- Copy shareable link ------------------------------------------- */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("on");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("on"),1800);
}
document.getElementById("copy").addEventListener("click", async ()=>{
  syncUrl();
  try{ await navigator.clipboard.writeText(location.href); toast("הקישור הועתק ✓"); }
  catch(_){ toast("העתיקו את הכתובת מהדפדפן"); }
});

/* ---------- Boot ----------------------------------------------------------- */
async function boot(){
  // Defaults come from the DOM; a shared URL hash overrides them.
  state.text=document.getElementById("text").value;
  if(location.hash.length>1) applyHash(location.hash.slice(1));
  applyStateToUI();
  bg=new Image();
  bg.onload=()=>requestRender();
  bg.src=CONFIG.imageSrc;
  try{
    await document.fonts.ready;
    await document.fonts.load(`700 40px "${state.font}"`);
    await document.fonts.load(`400 40px "${state.font}"`);
  }catch(_){}
  requestRender();
}
boot();
</script>
